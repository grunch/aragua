name: Deploy a GitHub Pages

# Se ejecuta en cada push a main, o manualmente desde la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el deploy oficial de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues en paralelo pisándose.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configurar Python (para generar escenas/miniaturas)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Pillow
        run: pip install pillow

      - name: Instalar dependencias
        run: npm ci

      - name: Generar manifiesto y miniaturas de escenas
        run: npm run scenes

      - name: Build de producción
        run: npm run build

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
